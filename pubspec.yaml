name: rhapathon_search
description: Rhapathon 2026 - Search registered attendees via KingsChat login.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/rhap_logo.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/rhap_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
